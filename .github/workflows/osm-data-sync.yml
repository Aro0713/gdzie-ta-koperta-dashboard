name: OSM data sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  sync-osm-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/osm/requirements.txt

      - name: Fetch OSM disabled parking data
        run: |
          python scripts/osm/fetch_disabled_parking.py

      - name: Commit changed data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/disabled-parking.geojson \
                  public/data/disabled-parking-metadata.json \
                  data/osm-disabled-parking.gpkg \
                  data/osm-disabled-parking.parquet

          if git diff --cached --quiet; then
            echo "No OSM data changes to commit."
          else
            git commit -m "Sync OSM disabled parking data"
            git push
          fi
